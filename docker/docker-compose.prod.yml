name: immich

services:
  immich-server:
    container_name: immich_server
    image: immich-server-custom:latest
    build:
      context: ../
      dockerfile: server/Dockerfile
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    environment:
      STICKER_GEN_URL: ${STICKER_GEN_URL:-http://172.17.0.1:8004}
      STICKER_S3_ENDPOINT: ${STICKER_S3_ENDPOINT:-https://chi.tacc.chameleoncloud.org:7480}
      STICKER_S3_ACCESS_KEY: ${STICKER_S3_ACCESS_KEY:-}
      STICKER_S3_SECRET_KEY: ${STICKER_S3_SECRET_KEY:-}
      STICKER_S3_BUCKET: ${STICKER_S3_BUCKET:-objstore-proj28}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-minio}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-immich}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-immich_minio_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-immich}
      IMMICH_TELEMETRY_INCLUDE: ${IMMICH_TELEMETRY_INCLUDE:-all}
    ports:
      - '2283:2283'
    depends_on:
      redis:
        condition: service_started
      database:
        condition: service_started
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    healthcheck:
      disable: false

volumes:
  model-cache:
